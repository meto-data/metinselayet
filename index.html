<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metin'in Çalışmaları</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .box {
            padding: 20px 40px;
            background-color: #fff;
            border: 2px solid #333;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .box:hover {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>Metin'in Çalışmaları</h1>

    <div class="container">
        <a href="yeni-odev/index.html" class="box">Dönem Sonu Ödevi</a>
        <a href="eski-odevler/index.html" class="box">Eski Ödevler</a>
    </div>

</body>
</html>
