<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitap Sepeti | İletişim</title>
    <link rel="icon" type="image/x-icon" href="../img/outliers.jpg">
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <header>
        <div class="kapsayici">
            <h1>Kitap Sepeti</h1>
            <p>Felsefe, sosyoloji ve klasiklerden seçili kitaplar</p>
        </div>
    </header>

    <nav>
        <div class="kapsayici">
            <a href="../index.html">Ana Sayfa</a>
            <a href="urunler.html">Ürünler</a>
            <a href="sepet.html">Sepet</a>
            <a href="iletisim.html">İletişim</a>
        </div>
    </nav>

    <div class="kapsayici icerik-arkaplani">
        <section>
            <h2>İletişim Formu</h2>
            <form action="sonuc.html" method="get">
                <label for="isim">İsim:</label>
                <input required minlength="2" maxlength="50" type="text" name="isim" id="isim">
                <br><br>

                <label for="eposta">E-posta:</label>
                <input type="email" name="eposta" id="eposta">
                <br><br>

                <label for="konu">Konu:</label>
                <input type="text" name="konu" id="konu">
                <br><br>

                <label for="memnunluk">Site memnuniyeti:</label>
                <input type="range" name="memnunluk" id="memnunluk" min="0" max="100">
                <br><br>

                <input type="submit" value="Gönder">
                <input type="reset" value="Temizle">
            </form>
        </section>

        <section>
            <h2>Bize Ulaşın</h2>
            <address>
                Adres: Tin
            </address>
        </section>
    </div>

    <footer>
        <div class="kapsayici">
            <p>2026 Kitap Sepeti | Yavaş ama güvenilir.</p>
        </div>
    </footer>

    <script src="../scripts/myscript.js"></script>
</body>
</html>
